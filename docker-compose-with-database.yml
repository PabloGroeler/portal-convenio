version: '3.8'

services:
  # PostgreSQL service
  postgres:
    image: postgres:16
    container_name: portal-emendas-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: app_emendas
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_emendas"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend service
  app:
    container_name: portal-emendas-backend
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
      args:
        UPLOAD_DIR: ${UPLOAD_DIR}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8085:8085"
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${UPLOAD_DIR}:${UPLOAD_DIR}
      - app-uploads:${UPLOAD_DIR}
    environment:
      UPLOAD_DIR: ${UPLOAD_DIR}
      # Override database connection for Docker network
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/app_emendas
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      # Disable Hibernate auto-generation - Flyway manages schema
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: none
      # Flyway configuration
      QUARKUS_FLYWAY_MIGRATE_AT_START: "true"
      QUARKUS_FLYWAY_BASELINE_ON_MIGRATE: "true"
      QUARKUS_FLYWAY_BASELINE_VERSION: "0"
      QUARKUS_FLYWAY_LOCATIONS: "classpath:db/migration"
      QUARKUS_FLYWAY_CLEAN_AT_START: "false"
      # Flyway repair - fixes checksum mismatches automatically
      QUARKUS_FLYWAY_REPAIR_AT_START: "true"
      QUARKUS_FLYWAY_IGNORE_MISSING_MIGRATIONS: "true"
      QUARKUS_FLYWAY_IGNORE_IGNORED_MIGRATIONS: "true"
      QUARKUS_HTTP_PORT: 8085
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_SWAGGER_UI_PATH: /swagger-ui

  # Frontend service
  frontend:
    container_name: portal-emendas-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    depends_on:
      - app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - API_BASE=${API_BASE}
      # Force axios to use the same-origin /api path so Vite proxy handles routing in Docker.
      - VITE_API_URL=/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm run dev -- --config vite.config.docker.ts"

volumes:
  postgres_data:
  app-uploads:
    driver: local
