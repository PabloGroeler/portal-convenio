version: '3.8'

services:
  # PostgreSQL service
  postgres:
    image: postgres:16
    container_name: portal-emendas-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: app-emendas
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app-emendas"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend service
  app:
    container_name: portal-emendas-backend
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_USERNAME: app
      QUARKUS_DATASOURCE_PASSWORD: app
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/app_emendas
      # Disable Hibernate auto-generation - Flyway manages schema
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: none
      # Flyway configuration
      QUARKUS_FLYWAY_MIGRATE_AT_START: "true"
      QUARKUS_FLYWAY_BASELINE_ON_MIGRATE: "true"
      QUARKUS_FLYWAY_BASELINE_VERSION: "0"
      QUARKUS_FLYWAY_LOCATIONS: "classpath:db/migration"
      QUARKUS_FLYWAY_CLEAN_AT_START: "false"
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_CORS_ORIGINS: "http://localhost:3000,http://76.13.168.39:3000"
      QUARKUS_SWAGGER_UI_PATH: /swagger-ui
      # Ensure JWT secret is available in container
      JWT_SECRET: "changeit-changeit-changeit-changeit"
      # External sync token (optional)
      EXTERNAL_EMENDAS_API_TOKEN: "a0c466c8230dc031ea5b833c0c03983fe892ec55298f3ebe6523b320acc29c3c"

  # Frontend service
  frontend:
    container_name: portal-emendas-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    depends_on:
      - app
    restart: unless-stopped
    environment:
      # Force axios to use the same-origin /api path so Vite proxy handles routing in Docker.
      - VITE_API_URL=/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm run dev -- --config vite.config.docker.ts"

volumes:
  postgres_data: