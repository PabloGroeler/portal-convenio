version: '3.8'

services:
  # PostgreSQL service
  postgres:
    image: postgres:16
    container_name: portal-emendas-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_emendas}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_emendas"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend service
  app:
    container_name: portal-emendas-backend
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER:-app}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-app}
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-app_emendas}
      # Disable Hibernate auto-generation - Flyway manages schema
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: none
      # Flyway configuration
      QUARKUS_FLYWAY_MIGRATE_AT_START: "true"
      QUARKUS_FLYWAY_BASELINE_ON_MIGRATE: "true"
      QUARKUS_FLYWAY_BASELINE_VERSION: "0"
      QUARKUS_FLYWAY_LOCATIONS: "classpath:db/migration"
      QUARKUS_FLYWAY_CLEAN_AT_START: "false"
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_CORS_ORIGINS: ${QUARKUS_HTTP_CORS_ORIGINS:-http://localhost:3000,http://76.13.168.39:3000}
      QUARKUS_SWAGGER_UI_PATH: /swagger-ui
      # JWT secret
      JWT_SECRET: ${JWT_SECRET:-changeit-changeit-changeit-changeit}
      # External sync token
      EXTERNAL_EMENDAS_API_TOKEN: ${EXTERNAL_EMENDAS_API_TOKEN:-a0c466c8230dc031ea5b833c0c03983fe892ec55298f3ebe6523b320acc29c3c}

      # Mailer Configuration
      QUARKUS_MAILER_MOCK: ${QUARKUS_MAILER_MOCK:-true}
      QUARKUS_MAILER_FROM: ${QUARKUS_MAILER_FROM:-noreply@portal-emendas.local}
      QUARKUS_MAILER_HOST: ${QUARKUS_MAILER_HOST:-}
      QUARKUS_MAILER_PORT: ${QUARKUS_MAILER_PORT:-587}
      QUARKUS_MAILER_START_TLS: ${QUARKUS_MAILER_START_TLS:-REQUIRED}
      QUARKUS_MAILER_USERNAME: ${SMTP_USERNAME:-}
      QUARKUS_MAILER_PASSWORD: ${SMTP_PASSWORD:-}
      QUARKUS_MAILER_AUTH_METHODS: ${QUARKUS_MAILER_AUTH_METHODS:-DIGEST-MD5 CRAM-SHA256 CRAM-SHA1 CRAM-MD5 PLAIN LOGIN}

  # Frontend service
  frontend:
    container_name: portal-emendas-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    depends_on:
      - app
    restart: unless-stopped
    environment:
      # Force axios to use the same-origin /api path so Vite proxy handles routing in Docker.
      - VITE_API_URL=/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm run dev -- --config vite.config.docker.ts"

volumes:
  postgres_data: