# CORS Configuration
quarkus.http.port=8085
quarkus.http.host=0.0.0.0
# Allow local dev and the deployed frontend (adjust as needed)
quarkus.http.cors.origins=${QUARKUS_HTTP_CORS_ORIGINS:http://localhost:3000,http://localhost:3001}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-allow-credentials=true

# Permit unauthenticated preflight requests on /api/* (fixes preflight being blocked by auth/security)
quarkus.http.auth.permission.preflight.paths=/api/*
quarkus.http.auth.permission.preflight.policy=permit

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:app}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:app}
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://76.13.168.39:5432/app_emendas}

# Connection pool settings ? give extra time to reach the external DB
quarkus.datasource.jdbc.acquisition-timeout=60
quarkus.datasource.jdbc.initial-size=1
quarkus.datasource.jdbc.min-size=1
quarkus.datasource.jdbc.max-size=10

# Disable Hibernate auto-generation - Flyway will manage schema
quarkus.hibernate-orm.database.generation=none

# Flyway Configuration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.clean-at-start=false
# Repair checksum mismatches automatically (useful in development)
quarkus.flyway.repair-at-start=true
# Ignore missing migrations (useful when cleaning up old migrations)
quarkus.flyway.ignore-missing-migrations=true
# Ignore ignored migrations
quarkus.flyway.ignore-ignored-migrations=true
# Allow out-of-order migrations (allows V10 to run after V11)
quarkus.flyway.out-of-order=true

# Docker/Production profile: force repair on startup
%docker.quarkus.flyway.repair-at-start=true
%docker.quarkus.flyway.ignore-missing-migrations=true
%docker.quarkus.flyway.out-of-order=true
%prod.quarkus.flyway.repair-at-start=true
%prod.quarkus.flyway.ignore-missing-migrations=true
%prod.quarkus.flyway.out-of-order=true

%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.hibernate-orm.database.generation=drop-and-create


# OpenAPI Configuration
quarkus.smallrye-openapi.info-title=Your API Documentation
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API documentation for your application
quarkus.smallrye-openapi.info-contact-email=your.email@example.com
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.always-include=true

quarkus.log.category."org.acme".level=DEBUG
quarkus.log.category."io.quarkus".level=INFO

# JWT configuration
jwt.secret=${JWT_SECRET:changeit-changeit-changeit-changeit}
jwt.expiration.seconds=${JWT_EXPIRATION_SECONDS:3600}

# Mailer Configuration
# Controlled by .env file: QUARKUS_MAILER_MOCK (false = send real emails, true = mock)
quarkus.mailer.mock=${QUARKUS_MAILER_MOCK:true}
quarkus.mailer.from=${QUARKUS_MAILER_FROM:sigadoc@sinop.mt.gov.br}
quarkus.mailer.host=${QUARKUS_MAILER_HOST:mail.sinop.mt.gov.br}
quarkus.mailer.port=${QUARKUS_MAILER_PORT:465}
quarkus.mailer.ssl=true
quarkus.mailer.username=${QUARKUS_MAILER_USERNAME:sigadoc@sinop.mt.gov.br}
quarkus.mailer.password=${QUARKUS_MAILER_PASSWORD}
quarkus.mailer.auth-methods=DIGEST-MD5 CRAM-SHA256 CRAM-SHA1 CRAM-MD5 PLAIN LOGIN

# Alternative IMAP/POP3 settings (for reference, not used by Mailer)
# IMAP: mail.sinop.mt.gov.br:993
# POP3: mail.sinop.mt.gov.br:995
# SMTP: mail.sinop.mt.gov.br:465 (SSL)

# External Emendas API Token
# Base URL used by the REST client
external-emendas-api/mp-rest/url=https://emendas.sinop.mt.leg.br
# Token can be provided either as a JVM system property (-Dexternal-emendas-api.token=...) or as env var EXTERNAL_EMENDAS_API_TOKEN.
external-emendas-api.token=${EXTERNAL_EMENDAS_API_TOKEN}

# External Emendas PUBLIC API (consolidated dataset)
# This endpoint must return JSON, not the HTML application shell. If you see HTML, double-check this host/base URL.
external-emendas-public-api/mp-rest/url=https://emendas.sinop.mt.leg.br

# Frontend Configuration
# Base URL for frontend application (used in email links)
frontend.base.url=${FRONTEND_BASE_URL:http://localhost:3000}
